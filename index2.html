<!DOCTYPE html>
<html>

<head>
    <title>Website Portfolio</title>
</head>

<body>
    <iframe
        src="https://script.google.com/macros/s/AKfycbzIRJzcJBt_3zb3LR47s-pVc1E5HoYk6OEfPg2euEms00XglRvRKCIC1fYTsZnNXf6Nsw/exec"
        width="100%" height="100%" allowfullscreen="true"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none;">
    </iframe>

    <script>
        window.onload = function () {
            document.querySelector('iframe')
                .requestFullscreen()
                .catch((err) => {
                    console.error('Error attempting to enable full-screen mode:', err.message);
                });
        };
    </script>
</body>

</html>
